{% extends 'base.html' %}

{% block titulo %}Câmbio — PIPE{% endblock %}

{% block conteudo %}
<div class="pagina-conteudo" style="max-width: 520px;">

  <div class="cabecalho-pagina">
    <h2>💱 Conversão de Moedas</h2>
    <p class="modulo-desc">Cotações em tempo real via <a href="https://wise.com/" target="_blank" rel="noopener" style="color:var(--cor-primaria);">Wise API</a></p>
  </div>

  <!-- Resultado -->
  <div class="cartao" style="margin-bottom:1rem;">
    <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;">
      <span id="camb-resultado"
            style="flex:1;font-size:1.4rem;font-weight:700;color:var(--cor-primaria);min-height:2rem;line-height:2rem;">
        —
      </span>
      <button id="camb-copiar" class="btn btn-secundario" title="Copiar"
              style="padding:.4rem .65rem;display:flex;align-items:center;gap:.35rem;flex-shrink:0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span id="camb-copiar-txt">Copiar</span>
      </button>
    </div>
    <p id="camb-taxa"
       style="margin:.75rem 0 0 0;font-size:.85rem;color:var(--cor-texto-suave);">
    </p>
    <div id="camb-fees" style="display:none;margin-top:.75rem;border-top:1px solid var(--cor-borda);padding-top:.65rem;">
      <p class="camb-fees-total" style="margin:0;font-size:.85rem;font-weight:600;color:var(--cor-texto);"></p>
      <div id="camb-fees-list" style="margin-top:.35rem;font-size:.8rem;color:var(--cor-texto-suave);display:flex;flex-direction:column;gap:.2rem;"></div>
    </div>
  </div>

  <!-- Controles -->
  <div class="cartao" style="margin-bottom:1rem;">
    <div class="campo">
      <label class="campo-label">Valor</label>
      <input type="number" id="camb-valor" class="input" value="1" min="0" step="any"
             style="font-size:1.1rem;padding:.6rem .75rem;">
    </div>

    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:.75rem;margin-top:1rem;align-items:end;">
      <div class="campo">
        <label class="campo-label">De</label>
        <select id="camb-origem" class="input">{% for cod, nome in moedas.items() %}
          <option value="{{ cod }}"{% if cod == 'EUR' %} selected{% endif %}>{{ nome }}</option>{% endfor %}
        </select>
      </div>
      <div style="display:flex;justify-content:center;align-self:center;margin-top:.8rem;">
      <button id="camb-inverter" class="btn btn-secundario" title="Inverter moedas"
              style="padding:.5rem;flex-shrink:0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 16l-4-4 4-4"/>
          <path d="M17 8l4 4-4 4"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
        </svg>
      </button>
      </div>
      <div class="campo">
        <label class="campo-label">Para</label>
        <select id="camb-destino" class="input">{% for cod, nome in moedas.items() %}
          <option value="{{ cod }}"{% if cod == 'BRL' %} selected{% endif %}>{{ nome }}</option>{% endfor %}
        </select>
      </div>
    </div>
  </div>

  <button id="camb-btn" class="btn btn-primario btn-bloco" style="font-size:1rem;padding:.7rem;">
    Converter
  </button>

</div>

<script>
(function () {
  'use strict';

  const elValor     = document.getElementById('camb-valor');
  const elOrigem    = document.getElementById('camb-origem');
  const elDestino   = document.getElementById('camb-destino');
  const elBtn       = document.getElementById('camb-btn');
  const elResultado = document.getElementById('camb-resultado');
  const elTaxa      = document.getElementById('camb-taxa');
  const elCopiar    = document.getElementById('camb-copiar');
  const elCopiarTxt = document.getElementById('camb-copiar-txt');
  const elInverter  = document.getElementById('camb-inverter');
  const elFees      = document.getElementById('camb-fees');
  const elFeesTotal = document.querySelector('.camb-fees-total');
  const elFeesList  = document.getElementById('camb-fees-list');

  const MOEDAS_INFO = {
    'EUR': { locale: 'pt-PT', currency: 'EUR' },
    'BRL': { locale: 'pt-BR', currency: 'BRL' },
    'USD': { locale: 'en-US', currency: 'USD' },
    'GBP': { locale: 'en-GB', currency: 'GBP' },
    'JPY': { locale: 'ja-JP', currency: 'JPY' },
    'CHF': { locale: 'de-CH', currency: 'CHF' },
    'CAD': { locale: 'en-CA', currency: 'CAD' },
    'AUD': { locale: 'en-AU', currency: 'AUD' },
  };

  function formatarMoeda(valor, moeda) {
    const info = MOEDAS_INFO[moeda] || { locale: 'pt-PT', currency: moeda };
    return new Intl.NumberFormat(info.locale, {
      style: 'currency',
      currency: moeda,
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    }).format(valor);
  }

  function converter() {
    elBtn.disabled = true;
    elResultado.textContent = '…';
    elTaxa.textContent = '';

    const payload = {
      origem: elOrigem.value,
      destino: elDestino.value,
      valor: parseFloat(elValor.value) || 0,
    };

    fetch('{{ url_for("cambio.api_convert") }}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': '{{ csrf_token() }}'
      },
      body: JSON.stringify(payload),
    })
    .then(r => {
      if (!r.ok) throw new Error('Erro na API');
      return r.json();
    })
    .then(data => {
      elResultado.textContent = formatarMoeda(data.resultado, data.destino);
      let info = '1 ' + data.origem + ' = ' + formatarMoeda(data.taxa, data.destino);
      if (data.fonte) {
        info += ' · ' + data.fonte;
        if (data.data) {
          let d = new Date(data.data);
          info += ' · ' + d.toLocaleDateString('pt-PT', {day:'2-digit', month:'2-digit', year:'numeric'}) +
                         ' ' + d.toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
        }
      }
      elTaxa.textContent = info;

      // Fees Wise
      if (data.total_fees !== null && data.total_fees !== undefined) {
        elFeesTotal.textContent = 'Taxas: ' + formatarMoeda(data.total_fees, data.origem);
        if (data.fees && data.fees.length > 0) {
          elFeesList.innerHTML = data.fees.map(f =>
            '<span>' + f.label + ': ' + formatarMoeda(f.amount, f.currency) + '</span>'
          ).join('');
        } else {
          elFeesList.innerHTML = '';
        }
        elFees.style.display = 'block';
      } else {
        elFees.style.display = 'none';
      }
    })
    .catch(() => {
      elResultado.textContent = 'Indisponível';
      elTaxa.textContent = 'Não foi possível obter as cotações.';
    })
    .finally(() => { elBtn.disabled = false; });
  }

  // Inverter moedas
  elInverter.addEventListener('click', () => {
    const tmp = elOrigem.value;
    elOrigem.value = elDestino.value;
    elDestino.value = tmp;
    converter();
  });

  // Copiar resultado
  elCopiar.addEventListener('click', () => {
    const txt = elResultado.textContent.trim();
    if (!txt || txt === '—') return;
    navigator.clipboard.writeText(txt).then(() => {
      elCopiarTxt.textContent = 'Copiado!';
      elCopiar.style.color = 'var(--cor-sucesso)';
      elCopiar.style.borderColor = 'var(--cor-sucesso)';
      setTimeout(() => {
        elCopiarTxt.textContent = 'Copiar';
        elCopiar.style.color = '';
        elCopiar.style.borderColor = '';
      }, 1500);
    });
  });

  // Eventos
  elBtn.addEventListener('click', converter);
  elDestino.addEventListener('change', converter);
  elOrigem.addEventListener('change', converter);
  elValor.addEventListener('keyup', (e) => { if (e.key === 'Enter') converter(); });

  converter();
})();
</script>
{% endblock %}
